<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

background:linear-gradient(
135deg,
#4f46e5,
#9333ea,
#ec4899
);

}

.glass{

width:400px;

padding:30px;

background:rgba(
255,
255,
255,
0.1
);

border-radius:20px;

backdrop-filter:blur(15px);

color:white;

}

h2{

text-align:center;

margin-bottom:20px;

}

.input-group{

margin-bottom:15px;

}

input{

width:100%;

padding:12px;

border:none;

border-radius:10px;

outline:none;

}

button{

width:100%;

padding:12px;

border:none;

border-radius:20px;

background:white;

color:#4f46e5;

font-weight:bold;

cursor:pointer;

}

.redirect{

text-align:center;

margin-top:15px;

}

a{

color:white;

}

</style>

</head>

<body>

<div class="glass">

<h2>Register</h2>

{% if Error %}
<p>{{Error}}</p>
{% endif %}

<form method="POST"
enctype="multipart/form-data">

{% csrf_token %}

<div class="input-group">
<input
type="text"
name="full_name"
placeholder="Full Name"
required>
</div>

<div class="input-group">
<input
type="email"
name="email"
placeholder="Email"
required>
</div>

<div class="input-group">
<input
type="password"
name="password"
placeholder="Password"
required>
</div>

<div class="input-group">
<input
type="text"
name="phone_number"
placeholder="Phone Number"
required>
</div>

<div class="input-group">
<input
type="file"
name="profile_pic">
</div>

<button type="submit">

Sign Up

</button>

</form>

<div class="redirect">

Already Registered?

<a href="{% url 'login' %}">
Login
</a>

</div>

</div>

</body>
</html>
