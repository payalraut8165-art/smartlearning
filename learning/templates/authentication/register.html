<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart LMS - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            color: #fff;
        }
        h2 { text-align: center; margin-bottom: 30px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        .input-group { position: relative; margin-bottom: 5px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; opacity: 0.9; }
        input, select, textarea {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px;
            color: #fff; font-size: 15px; outline: none; transition: 0.3s;
        }
        input:focus, select:focus, textarea:focus { background: rgba(255, 255, 255, 0.2); border-color: #fff; }
        select option { background: #764ba2; color: #fff; }
        .btn-submit {
            width: 100%; padding: 14px; background: #fff; color: #764ba2;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
        }
        .btn-submit:hover { background: #f0e6ff; transform: translateY(-2px); }
        .error-msg { background: rgba(255, 0, 0, 0.2); padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 20px; border: 1px solid red; }
        p.redirect { text-align: center; margin-top: 20px; font-size: 14px; }
        p.redirect a { color: #fff; font-weight: bold; text-decoration: none; border-bottom: 1px solid #fff; }
    </style>
</head>
<body>

<div class="glass-box">
    <h2>Student Registration</h2>
    
    {% if Error %}
        <div class="error-msg">{{ Error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'register' %}" enctype="multipart/form-data" autocomplete="off">
        {% csrf_token %}
        <div class="grid-container">
            <div class="input-group">
                <label>First Name *</label>
                <input type="text" name="first_name" required>
            </div>
            <div class="input-group">
                <label>Middle Name</label>
                <input type="text" name="middle_name">
            </div>
            <div class="input-group">
                <label>Last Name *</label>
                <input type="text" name="last_name" required>
            </div>
            <div class="input-group">
                <label>Email ID *</label>
                <input type="email" name="email" required autocomplete="new-password">
            </div>
            <div class="input-group">
                <label>Password *</label>
                <input type="password" name="password" required autocomplete="new-password">
            </div>
            <div class="input-group">
                <label>Phone Number *</label>
                <input type="text" name="phone_number" required>
            </div>
            <div class="input-group">
                <label>Birth Date *</label>
                <input type="date" name="birth_date" required>
            </div>
            <div class="input-group">
                <label>Gender *</label>
                <select name="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="input-group full-width">
                <label>Primary Subject of Interest *</label>
                <input type="text" name="subject" placeholder="e.g. Python, Django, Web Dev" required>
            </div>
            <div class="input-group full-width">
                <label>Address</label>
                <textarea name="address" rows="2"></textarea>
            </div>
            <div class="input-group">
                <label>City</label>
                <input type="text" name="city">
            </div>
            <div class="input-group">
                <label>State</label>
                <input type="text" name="state">
            </div>
            <div class="input-group">
                <label>Parent Contact Number</label>
                <input type="text" name="parent_contact">
            </div>
            <div class="input-group">
                <label>Profile Picture</label>
                <input type="file" name="profile_pic" accept="image/*">
            </div>
        </div>
        <button type="submit" class="btn-submit">Sign Up</button>
    </form>
    <p class="redirect">Already registered? <a href="{% url 'login' %}">Login Here</a></p>
</div>

</body>
</html>
